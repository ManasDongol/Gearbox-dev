<!-- Login Page -->
<div class="min-h-screen bg-[#EFEFEF] flex flex-col">
  <!-- Header -->
  <header class="p-6">
    <a routerLink="/home" class="flex items-center gap-2 w-fit">
      <!-- Gearbox Logo SVG -->
      <img src="gearbox_logo.svg" alt="gearbox logo" />
      <span class="text-lg font-semibold text-[#1a3a3a]">Gearbox</span>
    </a>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-sm w-full max-w-md p-10">
      <!-- Title -->
      <h1 class="text-2xl font-bold text-[#1a3a3a] text-center mb-8">Login to your account</h1>

      <!-- Form -->
      <form class="space-y-6">
        <!-- Email Field -->
        <div>
          <label for="login-email" class="block text-sm font-medium text-[#1a3a3a] mb-2"
            >Username</label
          >
          <input
            type="email"
            id="login-email"
            name="email"
            class="w-full px-4 py-3 bg-[#F0F0F0] border-none rounded-lg text-sm text-[#1a3a3a] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1a3a3a]/20 transition-all duration-200"
            placeholder=""
          />
        </div>

        <!-- Password Field -->
        <div>
          <label for="login-password" class="block text-sm font-medium text-[#1a3a3a] mb-2"
            >Password</label
          >
          <input
            type="password"
            id="login-password"
            name="password"
            class="w-full px-4 py-3 bg-[#F0F0F0] border-none rounded-lg text-sm text-[#1a3a3a] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1a3a3a]/20 transition-all duration-200"
            placeholder=""
          />
        </div>

        <!-- Forgot Password -->
        <div class="text-center">
          <a
            href="#"
            class="text-sm text-[#5a6a6a] hover:text-[#1a3a3a] transition-colors duration-200"
            >Forgot password?</a
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-3 bg-[#1a3a3a] text-white font-medium rounded-lg hover:bg-[#2a4a4a] focus:outline-none focus:ring-2 focus:ring-[#1a3a3a]/50 transition-all duration-200 cursor-pointer"
        >
          Login
        </button>
      </form>

      <!-- Register Link -->
      <p class="text-center text-sm text-[#5a6a6a] mt-6">
        Don't have an account?
        <a routerLink="/register" class="text-[#1a3a3a] font-medium hover:underline">Register</a>
      </p>
    </div>
  </main>
</div>
