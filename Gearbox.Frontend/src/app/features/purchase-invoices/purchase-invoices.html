<!-- Purchase Invoices Page -->
<div class="page-layout">
  <!-- Side Navigation -->
  <app-navmenu />

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-[#1a3a3a]">Purchase Invoices</h1>
      <!-- User Avatar -->
      <div
        class="w-10 h-10 rounded-full bg-[#1a3a3a] cursor-pointer hover:ring-2 hover:ring-[#1a3a3a]/30 transition-all duration-200"
      ></div>
    </div>

    <!-- Search Bar -->
    <div class="mb-6">
      <input
        type="text"
        placeholder="Search Orders"
        [(ngModel)]="searchQuery"
        class="w-full max-w-md px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm text-[#1a3a3a] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1a3a3a]/15 focus:border-transparent transition-all duration-200"
        id="search-orders"
      />
    </div>

    <!-- Invoice Table -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-100">
            <th
              class="text-left px-6 py-4 text-sm font-semibold text-[#1a3a3a] bg-gray-50/50"
            >
              ID
            </th>
            <th
              class="text-left px-6 py-4 text-sm font-semibold text-[#1a3a3a] bg-gray-50/50"
            >
              Vendor ID
            </th>
            <th
              class="text-left px-6 py-4 text-sm font-semibold text-[#1a3a3a] bg-gray-50/50"
            >
              Invoice Number
            </th>
            <th
              class="text-left px-6 py-4 text-sm font-semibold text-[#1a3a3a] bg-gray-50/50"
            >
              Total Number
            </th>
            <th
              class="text-left px-6 py-4 text-sm font-semibold text-[#1a3a3a] bg-gray-50/50"
            >
              Created Date
            </th>
          </tr>
        </thead>
        <tbody>
          @for (invoice of filteredInvoices; track invoice.id) {
            <tr
              class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors duration-150"
            >
              <td class="px-6 py-4 text-sm text-[#3a3a3a]">{{ invoice.id }}</td>
              <td class="px-6 py-4 text-sm text-[#3a3a3a]">{{ invoice.vendorId }}</td>
              <td class="px-6 py-4 text-sm text-[#3a3a3a]">{{ invoice.invoiceNumber }}</td>
              <td class="px-6 py-4 text-sm text-[#3a3a3a]">
                {{ invoice.totalNumber.toLocaleString() }}
              </td>
              <td class="px-6 py-4 text-sm text-[#3a3a3a]">{{ invoice.createdDate }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="px-6 py-16 text-center text-sm text-gray-400">
                No invoices found
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </main>
</div>
